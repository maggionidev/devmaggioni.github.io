baseURL = "https://maggioni.dev/"
title = "Gabriel Maggioni"
theme = "PaperMod"

[pagination]
pagerSize = 10

[services]
  [services.disqus]
    shortname = 'maggionidev'
  [services.googleAnalytics]
    id = 'G-3EJS7QXCTZ'

[privacy]
  [privacy.googleAnalytics]
    disable = false
    respectDoNotTrack = true

languageCode = "pt-br"
defaultContentLanguageInSubdir = true
defaultContentLanguage = "br"

[languages]
  [languages.br]
    languageName = "Português"
    weight = 1
    contentDir = "content/br"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Gabriel Maggioni"
  description = "Programming, Blender, Unity and devlogs from my personal projects."
  keywords = ["programação", "desenvolvimento de software", "desenvolvimento de jogos", "unity", "blender", "gamedev", "devlog", "projetos pessoais", "tecnologia", "programming", "software development", "game development", "coding", "3d modeling", "indie dev"]
  author = "Gabriel Maggioni"
  DateFormat = "02 Jan 2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  comments = true
  images = ["og-image.png"]

  ShowReadingTime = true
  ShowShareButtons = true
  ShareButtons = ["whatsapp", "x", "reddit", "telegram", "linkedin"]

  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

[params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"

  [params.label]
    text = "Home"
    icon = "/apple-touch-icon.png"
    iconHeight = 45

  [params.profileMode]
    enabled = false
    title = "Gabriel Maggioni"
    subtitle = "Bem vindo ao meu site!"
    imageUrl = "/apple-touch-icon.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "my image"

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "posts"
    [[params.profileMode.buttons]]
      name = "Tags"
      url = "tags"

  [params.homeInfoParams]
    Title = "Olá! \U0001F44B"
    Content = "Bem vindo ao meu blog!"

  [[params.socialIcons]]
    name = "youtube"
    url = "https://youtube.com/@maggionidev"
  [[params.socialIcons]]
    name = "tiktok"
    url = "https://tiktok.com/@maggionidev"
  [[params.socialIcons]]
    name = "instagram"
    url = "https://instagram.com/maggionidev"
  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/maggionidev"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/maggionidev"

# [params.analytics.google]
#    SiteVerificationTag = "XYZabc"
#  [params.analytics.bing]
#    SiteVerificationTag = "XYZabc"
#  [params.analytics.yandex]
#    SiteVerificationTag = "XYZabc"

  [params.cover]
    hidden = false
    hiddenInList = true
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/maggionidev/maggionidev.github.io/tree/main/content/"
    Text = " ✏️ Encontrou um erro? Sujira alterações!"
    appendFilePath = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.1
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
  identifier = "categories"
  name = "categories"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "buscar"
  url = "/search/"
  weight = 30

pygmentsUseClasses = true

[markup]
  [markup.highlight]
    noClasses = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
