<div id="disqus-wrapper">
<div id="disqus_thread"></div>

<div id="disqus-btn-wrapper">
  <button id="load-disqus-btn" style="margin-top:20px; padding:10px 16px; cursor:pointer;">
    Carregar comentários
  </button>
</div>

<script>
  var disqus_loaded = false;

  function loadDisqus() {
    if (disqus_loaded) return;
    disqus_loaded = true;

    var d = document, s = d.createElement('script');

    // se quiser usar config dinâmica do Hugo, dá pra plugar aqui depois
    /*
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    */

    s.src = 'https://maggionidev.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());

    (d.head || d.body).appendChild(s);
  }

  document.getElementById("load-disqus-btn").addEventListener("click", function () {
    loadDisqus();
    this.style.display = "none";
  });
</script>

<noscript>
  Please enable JavaScript to view the 
  <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a>
</noscript>
</div>
