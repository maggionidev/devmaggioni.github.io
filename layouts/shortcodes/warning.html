{{- $title := .Get "title" | default "Atenção" -}}
{{- $text := .Get "text" | default "" -}}

<div class="warning-box">
  <div class="warning-icon">
    ⚠️
  </div>
  <div class="warning-content">
    <div class="warning-title">{{ $title }}</div>
    <div class="warning-text">
      {{ $text | markdownify }}
    </div>
  </div>
</div>
